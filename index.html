<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-image: linear-gradient(to right, rgb(151, 253, 253), rgb(212, 237, 239));
    font-family: sans-serif;
    min-height: 100vh;
}

.nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding-top: 80px;
    margin-bottom: 30px;
}

img {
    height: 100px;
    width: 100px;
    border-radius: 60px;
    animation: logoPop 1.2s cubic-bezier(.4, 2, .6, .9);
}

@keyframes logoPop {
    0% {
        opacity: 0;
        transform: scale(0.7) rotate(-10deg);
    }

    60% {
        opacity: 1;
        transform: scale(1.1) rotate(5deg);
    }

    100% {
        opacity: 1;
        transform: scale(1) rotate(0);
    }
}

h1 {
    font-size: 40px;
    font-weight: 300;
    animation: slideIn 1.1s cubic-bezier(.4, 2, .6, .9);
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-60px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.info {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fadeIn 1.5s;
}

.info p {
    text-align: center;
    font-size: 25px;
    padding: 15px;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.input {
    height: 45px;
    width: 250px;
    border: 1px solid rgb(155, 152, 152);
    border-radius: 20px;
    font-size: 18px;
    padding-left: 20px;
}

.input:focus {
    outline: none;
    border-color: #00cfcf;
    box-shadow: 0 0 8px #00cfcf44;
    transition: border-color 0.3s, box-shadow 0.3s;
}

.btn {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

button {
    height: 40px;
    width: 150px;
    border-radius: 8px;
    border: 1px solid rgb(155, 152, 152);
    background-color: rgb(6, 116, 116);
    font-size: 20px;
    color: white;
    cursor: pointer;
    transition: background 0.3s,
        color 0.3s,
        transform 0.18s cubic-bezier(.4, 2, .6, .9),
        box-shadow 0.25s;
    box-shadow: 0 2px 8px rgba(6, 116, 116, 0.08);
    animation: btnPopIn 0.7s;
}

@keyframes btnPopIn {
    from {
        opacity: 0;
        transform: scale(0.8);
    }

    to {
        opacity: 1;
        transform: scale(1);
    }
}

button:hover:not(:disabled) {
    background-color: #00cfcf;
    color: #fffbe7;
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 6px 18px rgba(6, 116, 116, 0.18);
}

button:active:not(:disabled) {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(6, 116, 116, 0.08);
}

.weather-result,
#weather-result {
    text-align: center;
    font-size: 18px;
    margin: 25px;
    font-family: sans-serif;
    line-height: 1.8;
}

@media (max-width: 768px) {

    .nav {
        flex-direction: column;
        gap: 20px;
        padding-top: 50px;
        text-align: center;
    }

    img {
        height: 80px;
        width: 80px;
    }

    h1 {
        font-size: 32px;
    }

    .info p {
        font-size: 22px;
    }

    .input {
        width: 80%;
        max-width: 320px;
    }
}

/* ===================== */
/* MOBILE RESPONSIVENESS */
/* ===================== */

@media (max-width: 480px) {

    .nav {
        padding-top: 40px;
        gap: 15px;
    }

    img {
        height: 70px;
        width: 70px;
    }

    h1 {
        font-size: 26px;
        text-align: center;
        padding: 0 15px;
        line-height: 1.3;
    }

    .info {
        margin-top: 20px;
    }

    .info p {
        font-size: 20px;
    }

    .input {
        width: 90%;
        max-width: 280px;
        height: 45px;
        font-size: 16px;
        padding-left: 15px;
    }

    .btn {
        padding: 25px;
    }

    button {
        width: 140px;
        font-size: 16px;
    }

    .weather-result,
    #weather-result {
        font-size: 16px;
        padding: 0 15px;
        line-height: 1.7;
    }
}
    </style>

</head>

<body>
    <div class="nav">
        <img src="img.png">
        <h1>Smart Weather Dashboard</h1>
    </div>
    <div class="info">
        <p>Enter your Location</p>
        <input type="text" placeholder="" class="input">
    </div>
    <div class="btn"><button onclick="getWeather()">Get Weather</button></div>
    <script src="script.js"></script>
</body>

</html>
